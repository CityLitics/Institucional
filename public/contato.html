<html lang="pt-br">

    <link rel="stylesheet" href="/css/reset.css">
    <link rel="stylesheet" href="/css/responsive.css">
    <link rel="stylesheet" href="/css/contato.css">
    <title>EasyData - Contato</title>
    <link rel="icon" href="logos/favicon_easydata.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"

<body>

    <header>

        <section class="logoLogin">
            <a href="index.html">
                <img src="logos/Logo_EasyData_V02.png">
            </a>
        </section>

        <nav class="menu">
            <a href="index.html"><b>Home</b></a>
            <a href="quemSomos.html"><b>Quem Somos</b></a>
            <a href="contato.html"><b>Contato</b></a>
        </nav>

    </header>

    <main>

        <section class="section-contato">

            <div class="form-contato">

                <h1 class="tituloContato">Entre em contato</h1>
                <p class="subtituloContato">Envie sua mensagem para nossa equipe</p>

                <label class="tituloCampo">Nome:</label>
                <div class="campoInput">
                    <input type="text" placeholder="Digite seu nome">
                </div>

                <label class="tituloCampo">Email:</label>
                <div class="campoInput">
                    <input type="email" placeholder="Digite seu email">
                </div>

                <label class="tituloCampo">Mensagem:</label>
                <div class="campoMensagem">
                    <textarea placeholder="Digite sua mensagem"></textarea>
                </div>

                <button class="botaoContato">Enviar</button>

            </div>

        </section>

    </main>

    <footer>
    </footer>
